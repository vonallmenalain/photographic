# Example only. Create a private .env file on the QNAP and never commit it.
# Cloudflare Tunnel should route api.fotos.alae.app to http://photos-api:8787.
# Netlify frontend should use VITE_PHOTOS_API_BASE_URL=https://api.fotos.alae.app.

services:
  photos-api:
    build:
      context: ./apps/photos-api
    container_name: photographic-photos-api
    restart: unless-stopped
    environment:
      PORT: 8787
      PHOTO_ROOT: /data/photos
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      ACCESS_CODE_PEPPER: ${ACCESS_CODE_PEPPER}
      APP_BASE_URL: ${APP_BASE_URL:-https://fotos.alae.app}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://fotos.alae.app}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-150}
    volumes:
      - /share/FotosSchuleApp:/data/photos
    expose:
      - "8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - photos-api
